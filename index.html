<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Clínica Amoré - Sistema</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

header{
background:#2563eb;
color:white;
padding:15px;
font-size:20px;
}

nav{
background:white;
display:flex;
gap:10px;
padding:10px;
border-bottom:1px solid #ddd;
}

nav button{
padding:8px;
}

.section{
display:none;
padding:20px;
}

.active{
display:block;
}

.card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:8px;
}

input,textarea,select{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:10px;
}

button{
background:#2563eb;
border:none;
color:white;
padding:10px;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<header>Clínica Amoré</header>

<nav>

<button onclick="mostrar('dashboard')">Dashboard</button>
<button onclick="mostrar('pacientes')">Pacientes</button>
<button onclick="mostrar('agenda')">Agenda</button>
<button onclick="mostrar('financeiro')">Financeiro</button>
<button onclick="mostrar('relatorios')">Relatórios</button>

</nav>

<div id="dashboard" class="section active">

<div class="card">

<h3>Faturamento mensal</h3>

<canvas id="grafico"></canvas>

</div>

</div>

<div id="pacientes" class="section">

<div class="card">

<h3>Novo paciente</h3>

<input id="nomePaciente" placeholder="Nome">
<input id="telefonePaciente" placeholder="Telefone">

<button onclick="salvarPaciente()">Salvar</button>

</div>

<div class="card">

<h3>Lista</h3>

<div id="listaPacientes"></div>

</div>

</div>

<div id="agenda" class="section">

<div class="card">

<h3>Nova sessão</h3>

<select id="pacienteSessao"></select>

<input type="date" id="dataSessao">
<input type="time" id="horaSessao">

<input id="valorSessao" placeholder="Valor">

<button onclick="agendar()">Agendar</button>

</div>

</div>

<div id="financeiro" class="section">

<div class="card">

<h3>Registrar pagamento</h3>

<select id="pacientePagamento"></select>

<input id="valorPagamento" placeholder="Valor">

<button onclick="registrarPagamento()">Registrar</button>

</div>

</div>

<div id="relatorios" class="section">

<div class="card">

<h3>Relatório PDF</h3>

<select id="pacienteRelatorio"></select>

<button onclick="gerarPDF()">Gerar</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore,collection,addDoc,getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {

apiKey:"SUA_API_KEY",
authDomain:"SEU_DOMINIO",
projectId:"SEU_PROJECT_ID"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

window.mostrar=function(sec){

document.querySelectorAll(".section").forEach(s=>{

s.classList.remove("active")

})

document.getElementById(sec).classList.add("active")

}

window.salvarPaciente=async function(){

let nome=document.getElementById("nomePaciente").value

let telefone=document.getElementById("telefonePaciente").value

await addDoc(collection(db,"pacientes"),{

nome:nome,
telefone:telefone,
data:new Date()

})

alert("Paciente cadastrado")

}

window.agendar=async function(){

let paciente=document.getElementById("pacienteSessao").value

let data=document.getElementById("dataSessao").value

let hora=document.getElementById("horaSessao").value

let valor=document.getElementById("valorSessao").value

await addDoc(collection(db,"sessoes"),{

paciente,
data,
hora,
valor

})

let tel=prompt("Telefone")

let msg=`Lembrete da sessão ${paciente} dia ${data} às ${hora}`

window.open(`https://wa.me/55${tel}?text=${encodeURIComponent(msg)}`)

}

window.registrarPagamento=async function(){

let paciente=document.getElementById("pacientePagamento").value

let valor=document.getElementById("valorPagamento").value

await addDoc(collection(db,"pagamentos"),{

paciente,
valor,
data:new Date()

})

alert("Pagamento registrado")

}

window.gerarPDF=function(){

let paciente=document.getElementById("pacienteRelatorio").value

let w=window.open()

w.document.write(`<h1>Relatório do paciente ${paciente}</h1>`)

w.print()

}

</script>

<script>

const ctx=document.getElementById("grafico")

new Chart(ctx,{

type:"bar",

data:{

labels:["Jan","Fev","Mar","Abr"],

datasets:[{

label:"Faturamento",

data:[1200,900,1500,2000]

}]

}

})

</script>

</body>

</html>
