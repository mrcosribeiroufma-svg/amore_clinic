<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>Login - Amoré</title>
  <meta name="theme-color" content="#9b72cf"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
    
    :root {
      --lilac: #9b72cf;
      --lilac-dark: #7a52af;
      --bg: #fdf6ff;
      --white: #ffffff;
      --text: #2d2d3a;
      --red: #ef6b6b;
      --green: #56c79a;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(135deg, var(--lilac) 0%, var(--lilac-dark) 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .login-container {
      background: var(--white);
      border-radius: 24px;
      padding: 40px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    
    .logo-container {
      text-align: center;
      margin-bottom: 32px;
    }
    
    .logo {
      width: 80px;
      height: 80px;
      background: var(--lilac);
      border-radius: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      margin-bottom: 16px;
    }
    
    h1 {
      color: var(--text);
      font-size: 28px;
      font-weight: 800;
      text-align: center;
      margin-bottom: 8px;
    }
    
    .subtitle {
      color: #8e849c;
      text-align: center;
      font-size: 15px;
      margin-bottom: 32px;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    label {
      display: block;
      color: var(--text);
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 14px;
    }
    
    input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e8ddf5;
      border-radius: 12px;
      font-size: 16px;
      font-family: 'Nunito', sans-serif;
      transition: all 0.3s;
    }
    
    input:focus {
      outline: none;
      border-color: var(--lilac);
      box-shadow: 0 0 0 4px rgba(155, 114, 207, 0.1);
    }
    
    .btn {
      width: 100%;
      padding: 16px;
      background: var(--lilac);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      font-family: 'Nunito', sans-serif;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 8px;
    }
    
    .btn:hover {
      background: var(--lilac-dark);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(155, 114, 207, 0.3);
    }
    
    .btn:active {
      transform: translateY(0);
    }
    
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    
    .error-message {
      background: #ffebee;
      color: var(--red);
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
    }
    
    .error-message.show {
      display: block;
    }
    
    .divider {
      text-align: center;
      margin: 24px 0;
      color: #8e849c;
      font-size: 14px;
      position: relative;
    }
    
    .divider::before,
    .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: #e8ddf5;
    }
    
    .divider::before { left: 0; }
    .divider::after { right: 0; }
    
    .forgot-password {
      text-align: center;
      margin-top: 16px;
    }
    
    .forgot-password a {
      color: var(--lilac);
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
    }
    
    .forgot-password a:hover {
      text-decoration: underline;
    }
    
    .loading {
      display: none;
      text-align: center;
      padding: 20px;
    }
    
    .spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid var(--lilac);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .security-info {
      background: #e8f5e9;
      border-left: 4px solid var(--green);
      padding: 12px;
      border-radius: 8px;
      margin-top: 24px;
      font-size: 13px;
      color: #2e7d32;
    }

    .security-info strong {
      display: block;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo-container">
      <div class="logo">💜</div>
      <h1>Amoré</h1>
      <p class="subtitle">Núcleo de Linguagem Infantil</p>
    </div>

    <div id="errorMessage" class="error-message"></div>
    
    <form id="loginForm">
      <div class="form-group">
        <label for="email">E-mail</label>
        <input 
          type="email" 
          id="email" 
          placeholder="seu@email.com" 
          required
          autocomplete="email"
        />
      </div>
      
      <div class="form-group">
        <label for="password">Senha</label>
        <input 
          type="password" 
          id="password" 
          placeholder="••••••••" 
          required
          autocomplete="current-password"
          minlength="6"
        />
      </div>
      
      <button type="submit" class="btn" id="loginBtn">Entrar</button>
      
      <div class="forgot-password">
        <a href="#" id="forgotPassword">Esqueci minha senha</a>
      </div>
    </form>

    <div class="divider">ou</div>

    <button class="btn" id="createAccountBtn" style="background: #56c79a;">
      Criar nova conta
    </button>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p style="margin-top: 12px; color: var(--text);">Autenticando...</p>
    </div>

    <div class="security-info">
      <strong>🔒 Acesso Seguro</strong>
      Seus dados são protegidos com criptografia de ponta a ponta e em conformidade com a LGPD.
    </div>
  </div>

  <!-- Firebase SDK v10 (modular) -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

    // ═══════════════════════════════════════════════════════════════
    // CONFIGURAÇÃO DO FIREBASE
    // ═══════════════════════════════════════════════════════════════
    const firebaseConfig = {
      apiKey: "AIzaSyC5Smoq3If0SluBOkt4eZvXy06oWZm6ECk",
      authDomain: "amore-clinica.firebaseapp.com",
      projectId: "amore-clinica",
      storageBucket: "amore-clinica.firebasestorage.app",
      messagingSenderId: "96077707498",
      appId: "1:96077707498:web:994178902e9515f967bf93"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // ═══════════════════════════════════════════════════════════════
    // ELEMENTOS DO DOM
    // ═══════════════════════════════════════════════════════════════
    const loginForm = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('loginBtn');
    const createAccountBtn = document.getElementById('createAccountBtn');
    const forgotPasswordLink = document.getElementById('forgotPassword');
    const errorMessage = document.getElementById('errorMessage');
    const loading = document.getElementById('loading');

    // ═══════════════════════════════════════════════════════════════
    // VERIFICAR SE JÁ ESTÁ LOGADO
    // ═══════════════════════════════════════════════════════════════
    auth.onAuthStateChanged((user) => {
      if (user) {
        // Usuário já logado, redireciona para o app
        window.location.href = '/index.html';
      }
    });

    // ═══════════════════════════════════════════════════════════════
    // FUNÇÃO AUXILIAR: MOSTRAR ERRO
    // ═══════════════════════════════════════════════════════════════
    function showError(message) {
      errorMessage.textContent = message;
      errorMessage.classList.add('show');
      setTimeout(() => {
        errorMessage.classList.remove('show');
      }, 5000);
    }

    // ═══════════════════════════════════════════════════════════════
    // FUNÇÃO AUXILIAR: TRADUZIR ERROS DO FIREBASE
    // ═══════════════════════════════════════════════════════════════
    function getErrorMessage(errorCode) {
      const errors = {
        'auth/invalid-email': 'E-mail inválido',
        'auth/user-disabled': 'Usuário desativado',
        'auth/user-not-found': 'Usuário não encontrado',
        'auth/wrong-password': 'Senha incorreta',
        'auth/email-already-in-use': 'Este e-mail já está cadastrado',
        'auth/weak-password': 'A senha deve ter pelo menos 6 caracteres',
        'auth/network-request-failed': 'Erro de conexão. Verifique sua internet.',
        'auth/too-many-requests': 'Muitas tentativas. Tente novamente mais tarde.',
        'auth/invalid-credential': 'Credenciais inválidas. Verifique seu e-mail e senha.'
      };
      return errors[errorCode] || 'Erro ao autenticar. Tente novamente.';
    }

    // ═══════════════════════════════════════════════════════════════
    // LOGIN COM E-MAIL E SENHA
    // ═══════════════════════════════════════════════════════════════
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = emailInput.value.trim();
      const password = passwordInput.value;

      // Validação básica
      if (!email || !password) {
        showError('Preencha todos os campos');
        return;
      }

      // Mostrar loading
      loginBtn.disabled = true;
      loginBtn.textContent = 'Entrando...';

      try {
        // Tentar fazer login
        await signInWithEmailAndPassword(auth, email, password);
        // O redirecionamento acontece automaticamente no onAuthStateChanged
      } catch (error) {
        console.error('Erro no login:', error);
        showError(getErrorMessage(error.code));
        loginBtn.disabled = false;
        loginBtn.textContent = 'Entrar';
      }
    });

    // ═══════════════════════════════════════════════════════════════
    // CRIAR NOVA CONTA
    // ═══════════════════════════════════════════════════════════════
    createAccountBtn.addEventListener('click', async () => {
      const email = emailInput.value.trim();
      const password = passwordInput.value;

      if (!email || !password) {
        showError('Preencha e-mail e senha para criar uma conta');
        return;
      }

      if (password.length < 6) {
        showError('A senha deve ter pelo menos 6 caracteres');
        return;
      }

      createAccountBtn.disabled = true;
      createAccountBtn.textContent = 'Criando conta...';

      try {
        await createUserWithEmailAndPassword(auth, email, password);
        // O redirecionamento acontece automaticamente no onAuthStateChanged
      } catch (error) {
        console.error('Erro ao criar conta:', error);
        showError(getErrorMessage(error.code));
        createAccountBtn.disabled = false;
        createAccountBtn.textContent = 'Criar nova conta';
      }
    });

    // ═══════════════════════════════════════════════════════════════
    // RECUPERAR SENHA
    // ═══════════════════════════════════════════════════════════════
    forgotPasswordLink.addEventListener('click', async (e) => {
      e.preventDefault();
      
      const email = emailInput.value.trim();
      
      if (!email) {
        showError('Digite seu e-mail para recuperar a senha');
        emailInput.focus();
        return;
      }

      try {
        await sendPasswordResetEmail(auth, email);
        alert('✅ E-mail de recuperação enviado! Verifique sua caixa de entrada.');
      } catch (error) {
        console.error('Erro ao enviar e-mail:', error);
        showError(getErrorMessage(error.code));
      }
    });
  </script>
</body>
</html>
